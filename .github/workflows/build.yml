name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          Remove-Item -Recurse -Force node_modules, package-lock.json -ErrorAction SilentlyContinue
          npm install

      - name: Build Windows (NSIS + Portable ZIP)
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: onehand-windows-installer
          path: release/OneHand-*-Windows-Setup-x64*.exe
          if-no-files-found: error

      - name: Upload Windows Portable
        uses: actions/upload-artifact@v4
        with:
          name: onehand-windows-portable
          path: release/OneHand-*-Windows-x64.zip
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build macOS
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: onehand-macos
          path: release/*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: onehand-windows-installer
          path: release-windows

      - name: Download Windows Portable
        uses: actions/download-artifact@v4
        with:
          name: onehand-windows-portable
          path: release-windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: onehand-macos
          path: release-macos

      - name: Prepare release assets
        run: |
          cd release-windows
          echo "Windows files:"
          ls -la
          cd ../release-macos
          echo "macOS files:"
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-windows/OneHand-*-Windows-Setup-x64*.exe
            release-windows/OneHand-*-Windows-x64.zip
            release-macos/OneHand-*-macOS-*.dmg
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
