appId: com.handbook.app
productName: Handbook
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
win:
  target: 
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  signingHashAlgorithms: []
  verifyUpdateCodeSignature: false
  requestedExecutionLevel: asInvoker
mac:
  target: dmg
  icon: build/icon.icns
linux:
  target: AppImage
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
